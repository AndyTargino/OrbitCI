name: Build macOS

on:
  release:
    types: [published]

jobs:
  build:
    steps:
      - name: Install Dependencies
        run: npm ci

      - name: Install Python setuptools
        run: python3 -m pip install setuptools

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --macos --publish always
